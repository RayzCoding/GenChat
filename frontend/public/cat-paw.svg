<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none" aria-label="Cat paw">
  <!-- Main pad -->
  <ellipse cx="60" cy="98" rx="34" ry="30" fill="#F4A6B8"/>
  <ellipse cx="60" cy="96" rx="28" ry="24" fill="#F8C4D0" opacity="0.6"/>

  <!-- Toe beans (top-left to top-right) -->
  <ellipse cx="28" cy="52" rx="14" ry="18" transform="rotate(-18 28 52)" fill="#F4A6B8"/>
  <ellipse cx="48" cy="34" rx="13" ry="17" transform="rotate(-6 48 34)" fill="#F4A6B8"/>
  <ellipse cx="72" cy="34" rx="13" ry="17" transform="rotate(6 72 34)" fill="#F4A6B8"/>
  <ellipse cx="92" cy="52" rx="14" ry="18" transform="rotate(18 92 52)" fill="#F4A6B8"/>

  <!-- Toe highlights -->
  <ellipse cx="26" cy="48" rx="6" ry="7" transform="rotate(-18 26 48)" fill="#FCE0E8" opacity="0.7"/>
  <ellipse cx="47" cy="30" rx="5" ry="6" transform="rotate(-6 47 30)" fill="#FCE0E8" opacity="0.7"/>
  <ellipse cx="73" cy="30" rx="5" ry="6" transform="rotate(6 73 30)" fill="#FCE0E8" opacity="0.7"/>
  <ellipse cx="94" cy="48" rx="6" ry="7" transform="rotate(18 94 48)" fill="#FCE0E8" opacity="0.7"/>

  <!-- Outline for crispness on dark backgrounds -->
  <g stroke="#E8899E" stroke-width="2" fill="none" stroke-linejoin="round">
    <ellipse cx="60" cy="98" rx="34" ry="30"/>
    <ellipse cx="28" cy="52" rx="14" ry="18" transform="rotate(-18 28 52)"/>
    <ellipse cx="48" cy="34" rx="13" ry="17" transform="rotate(-6 48 34)"/>
    <ellipse cx="72" cy="34" rx="13" ry="17" transform="rotate(6 72 34)"/>
    <ellipse cx="92" cy="52" rx="14" ry="18" transform="rotate(18 92 52)"/>
  </g>
</svg>
