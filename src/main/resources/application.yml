server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/chat_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 5

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
          maxTokens: 5000
      embedding:
        api-key: ${OPENAI_API_KEY:your-api-key}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com}
        options:
          model: text-embedding-v4
          dimmension: 1024
      multimodal:
        options:
          model: qwen3-vl-plus
          temperature: 0.2

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml

tavily:
  api-key: ${TAVILY_API_KEY:test}
  mcp-url: ${TAVILY_MCP_URL:https://mcp.tavily.com/mcp/}

minio:
  url: ${MINIO_URL:localhost:19000/}
  accessKey: ${MINIO_ACCESS_KEY:ak}
  secretKey: ${MINIO_SECRET_KEY:sk}
  bucketName: ${MINIO_BUCKET:test}
  endpoint: ${MINIO_ENDPOINT:localhost:19000/}

embeddings:
  store:
    host: ${PGVECTOR_HOST:127.0.0.1}
    port: ${PGVECTOR_PORT:5433}
    database: ${PGVECTOR_DATABASE:vectordb}
    user: ${PGVECTOR_USER:vectoruser}
    password: ${PGVECTOR_PASSWORD:123456}

skills:
  directory: ${SKILLS_DIRECTORY:}

ppt:
  python-script: ${PPT_PYTHON_SCRIPT:}
