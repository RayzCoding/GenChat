server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/chat_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
          maxTokens: 5000
      multimodal:
        options:
          model: qwen3-vl-plus
          temperature: 0.2
  profiles:
    active: local

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

tavily:
  api-key: test
  mcp-url: https://mcp.tavily.com/mcp/

minio:
  url: localhost:19000/
  accessKey: ak
  secretKey: sk
  bucketName: test
  endpoint: localhost:19000/

embeddings:
  store:
    host: 192.168.113.52
    port: 5433
    database: vector_store
    user: postgres
    password: postgres