services:
  mysql:
    image: mysql:8.0
    container_name: genchat-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-your_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chat_agent}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_PASSWORD:-your_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - genchat

  redis:
    image: redis:7-alpine
    container_name: genchat-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - genchat

  minio:
    image: minio/minio:latest
    container_name: genchat-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-ak}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-sk}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - genchat

  minio-init:
    image: minio/mc:latest
    container_name: genchat-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-ak} ${MINIO_SECRET_KEY:-sk}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${MINIO_BUCKET:-test}
      "
    networks:
      - genchat

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: genchat-pgvector
    restart: unless-stopped
    ports:
      - "${PGVECTOR_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${PGVECTOR_DATABASE:-vectordb}
      POSTGRES_USER: ${PGVECTOR_USER:-vectoruser}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-123456}
      TZ: Asia/Shanghai
    volumes:
      - pgvector-data:/var/lib/postgresql/data
      - ./docker/pgvector/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-vectoruser} -d ${PGVECTOR_DATABASE:-vectordb}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - genchat

networks:
  genchat:
    name: genchat

volumes:
  mysql-data:
  redis-data:
  minio-data:
  pgvector-data:
